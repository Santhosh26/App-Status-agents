name = "status-agent"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "status-agent-db"
database_id = "8731667b-ecc3-47e6-bbb0-83f126c60f67"

[durable_objects]
bindings = [
  { name = "STATUS_AGENT", class_name = "StatusAgent" },
  { name = "INCIDENT_REPORT_AGENT", class_name = "IncidentReportAgent" },
  { name = "COMMUNICATION_AGENT", class_name = "CommunicationAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StatusAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["IncidentReportAgent", "CommunicationAgent"]

[vars]
TARGET_API_URL = "https://status-agent-target-api.santgutz2000.workers.dev"
CF_ACCOUNT_ID = "75e9c0f2f8195fc7acfc424a3bee313e"
TARGET_WORKER_NAME = "status-agent-target-api"
GITHUB_OWNER = "Santhosh26"
GITHUB_REPO = "App-Status-agents"

# Secrets (set via wrangler secret put):
# CLOUDFLARE_API_TOKEN
# SLACK_WEBHOOK_URL
# DISCORD_WEBHOOK_URL
# RESEND_API_KEY
# RESEND_FROM_EMAIL (e.g. "StatusAgent <you@yourdomain.com>" or "onboarding@resend.dev")
# NOTIFICATION_EMAILS (comma-separated recipient emails)
# GITHUB_TOKEN

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
